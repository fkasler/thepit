</script>
  <style>
    /* ── Reset ── */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      background: #0d1117;
      color: #c9d1d9;
      padding: 24px;
      min-height: 100vh;
    }

    h1 {
      color: #58a6ff;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    h2 {
      color: #8b949e;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 10px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 16px;
    }

    label {
      font-size: 12px;
      color: #8b949e;
      display: block;
      margin-bottom: 4px;
    }

    input[type=text] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #c9d1d9;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 10px;
      margin-bottom: 10px;
      outline: none;
    }

    input[type=text]:focus {
      border-color: #58a6ff;
    }

    button {
      background: #238636;
      border: 1px solid #2ea043;
      border-radius: 4px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      padding: 6px 16px;
      margin-right: 8px;
    }

    button:disabled {
      opacity: 0.5;
      cursor: default;
    }

    button.secondary {
      background: #21262d;
      border-color: #30363d;
    }

    button.danger {
      background: #6e1a1a;
      border-color: #f85149;
    }

    /* ── Token type radio ── */
    .token-type {
      display: flex;
      gap: 16px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #8b949e;
    }

    .token-type label {
      display: flex;
      align-items: center;
      gap: 5px;
      margin: 0;
      cursor: pointer;
    }

    .token-type input {
      accent-color: #58a6ff;
    }

    /* ── Tunnel list ── */
    #tunnel-list-wrap {
      display: none;
      margin-top: 12px;
    }

    #tunnel-list-wrap>label {
      margin-bottom: 8px;
    }

    .tunnel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      padding: 8px 10px;
      margin-bottom: 6px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .tunnel-item:hover {
      border-color: #58a6ff44;
    }

    .tunnel-item.selected {
      border-color: #58a6ff;
      background: #1c2d3f;
    }

    .tunnel-item input[type=radio] {
      accent-color: #58a6ff;
      flex-shrink: 0;
    }

    .tunnel-meta {
      flex: 1;
      min-width: 0;
    }

    .tunnel-name {
      font-size: 13px;
      color: #e6edf3;
    }

    .tunnel-detail {
      font-size: 11px;
      color: #8b949e;
      margin-top: 2px;
    }

    .tunnel-badge {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 3px;
      flex-shrink: 0;
      font-weight: 600;
    }

    .tunnel-badge.online {
      background: #1d3d2a;
      color: #7ee787;
    }

    .tunnel-badge.offline {
      background: #2a1d1d;
      color: #f85149;
    }

    /* ── Status dots ── */
    #status-ws,
    #status-ssh,
    #status-ch {
      display: inline-block;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #484f58;
      margin-right: 6px;
      vertical-align: middle;
      transition: background 0.3s;
    }

    .status-ok {
      background: #3fb950 !important;
    }

    .status-err {
      background: #f85149 !important;
    }

    .status-pnd {
      background: #d29922 !important;
    }

    .row {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .status-label {
      font-size: 12px;
      color: #8b949e;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      border-radius: 3px;
      font-size: 10px;
      padding: 1px 5px;
      margin-right: 6px;
      font-weight: 600;
    }

    .badge.ws {
      background: #1f3d5c;
      color: #79c0ff;
    }

    .badge.ssh {
      background: #2d1f5c;
      color: #d2a8ff;
    }

    .badge.wasm {
      background: #1d3d2a;
      color: #7ee787;
    }

    .badge.rpc {
      background: #3d2a1d;
      color: #ffa657;
    }

    /* ── System log ── */
    #log {
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 12px;
      height: 220px;
      overflow-y: auto;
      padding: 10px 14px;
    }

    .log-line {
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-line.info {
      color: #58a6ff;
    }

    .log-line.ok {
      color: #3fb950;
    }

    .log-line.warn {
      color: #d29922;
    }

    .log-line.error {
      color: #f85149;
    }

    .log-line.data {
      color: #a5d6ff;
    }

    .log-line.dim {
      color: #484f58;
    }

    /* ── Terminal ── */
    #terminal-wrap {
      display: none;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    #terminal-titlebar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1c2128;
      border-bottom: 1px solid #30363d;
      padding: 8px 14px;
      font-size: 12px;
      color: #8b949e;
    }

    #terminal-titlebar span {
      color: #58a6ff;
      font-weight: 600;
    }

    #terminal-output {
      background: #0d1117;
      font-size: 12px;
      height: 380px;
      overflow-y: auto;
      padding: 10px 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* terminal output classes */
    .t-prompt {
      color: #58a6ff;
    }

    .t-cmd {
      color: #e6edf3;
    }

    .t-out {
      color: #c9d1d9;
    }

    .t-err {
      color: #f85149;
    }

    .t-ok {
      color: #3fb950;
    }

    .t-warn {
      color: #d29922;
    }

    .t-dim {
      color: #484f58;
    }

    .t-path {
      color: #79c0ff;
    }

    .t-key {
      color: #d2a8ff;
    }

    .t-val {
      color: #a5d6ff;
    }

    .t-dir {
      color: #58a6ff;
      font-weight: 600;
    }

    .t-file {
      color: #c9d1d9;
    }

    .t-link {
      color: #7ee787;
    }

    /* dir table */
    .dir-table {
      border-collapse: collapse;
      margin: 4px 0;
    }

    .dir-table td {
      padding: 1px 14px 1px 0;
      font-size: 12px;
    }

    /* download button inline */
    .t-dl-btn {
      display: inline-block;
      margin-top: 4px;
      background: #1f6feb;
      border: 1px solid #388bfd;
      border-radius: 3px;
      color: #fff;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      padding: 2px 10px;
    }

    /* tab-complete dropdown */
    #autocomplete {
      position: absolute;
      background: #1c2128;
      border: 1px solid #30363d;
      border-radius: 4px;
      font-size: 12px;
      max-height: 160px;
      overflow-y: auto;
      z-index: 100;
      min-width: 200px;
      display: none;
    }

    #autocomplete .ac-item {
      padding: 4px 10px;
      cursor: pointer;
      white-space: nowrap;
    }

    #autocomplete .ac-item:hover,
    #autocomplete .ac-item.ac-active {
      background: #2d333b;
    }

    #autocomplete .ac-item .ac-sub {
      color: #484f58;
      font-size: 11px;
      margin-left: 8px;
    }

    /* input row */
    #terminal-input-wrap {
      display: flex;
      align-items: center;
      background: #0d1117;
      border-top: 1px solid #30363d;
      padding: 8px 14px;
      gap: 6px;
      position: relative;
    }

    #terminal-prompt-label {
      color: #58a6ff;
      font-size: 12px;
      white-space: nowrap;
      flex-shrink: 0;
      user-select: none;
      line-height: 1;
      margin: 0;
      padding: 0;
    }

    #terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-family: inherit;
      font-size: 12px;
      caret-color: #58a6ff;
      line-height: 1;
      vertical-align: baseline;
      margin: 0;
      padding: 0;
    }

      <span id="status-ws"></span><span class="status-label">WebSocket</span>
      <span id="status-ssh"></span><span class="status-label">SSH handshake</span>
      <span id="status-ch"></span><span class="status-label">Channel open (31545)</span>
    </div>
  </div>

  <!-- Auth + tunnel picker -->
  <div class="card">
    <label>Auth token</label>
    <input id="auth-token" type="text" placeholder="gho_... or eyJhbGci...">
    <div class="token-type">
      <label><input type="radio" name="token-type" value="github" checked> GitHub (gho_...)</label>
      <label><input type="radio" name="token-type" value="bearer"> Azure / Bearer</label>
    </div>
    <button id="btn-list" style="background:#1f6feb;border-color:#388bfd">List tunnels</button>
    <button id="btn-clear" class="secondary">Clear log</button>

    <div id="tunnel-list-wrap">
      <hr style="border-color:#30363d;margin:12px 0 10px">
      <label>Available tunnels — select one and click Connect</label>
      <div id="tunnel-list"></div>
      <div style="margin-top:10px">
        <button id="btn-connect" disabled>Connect</button>
      </div>
    </div>
  </div>

  <!-- Terminal (shown after connect) -->
  <div id="terminal-wrap">
    <div id="terminal-titlebar">
      <span id="terminal-host">tunnel shell</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="btn-disconnect" class="danger" style="padding:3px 10px;font-size:11px">Disconnect</button>
        <button id="btn-clear-term" class="secondary" style="padding:3px 10px;font-size:11px">Clear</button>
      </div>
    </div>
    <div id="terminal-output"></div>
    <div id="terminal-input-wrap">
      <span id="terminal-prompt-label">$&nbsp;</span>
      <div style="position:relative;flex:1;display:flex">
        <input id="terminal-input" type="text" autocomplete="off" spellcheck="false"
          placeholder="type a command or 'help'…">
        <div id="autocomplete"></div>
      </div>
    </div>
  </div>

  <!-- System log -->
  <div style="margin-bottom:8px;display:flex;align-items:center;justify-content:space-between">
    <h2 style="margin:0">System log</h2>
  </div>
  <div id="log"></div>

  <script>
(async function(){

    // ════════════════════════════════════════════════════════════════════════════
    // WebSocket monkey-patch — inject connect token via subprotocol
    // ════════════════════════════════════════════════════════════════════════════

    let _tunnelToken = '';
    let _relayHost = '';

    function setTunnelAuth(token, relayHost) {
      _tunnelToken = token;
      _relayHost = relayHost;
    }

    const OriginalWebSocket = window.WebSocket;
    window.OriginalWebSocket = OriginalWebSocket;

    class PatchedWebSocket extends OriginalWebSocket {
      constructor(url, protocols) {
        const urlStr = typeof url === 'string' ? url : url.toString();
        if (_tunnelToken && _relayHost && urlStr.includes(_relayHost)) {
          const safeToken = _tunnelToken.replace(/[^a-zA-Z0-9\-_.]/g, '');
          const existing = Array.isArray(protocols) ? protocols : protocols ? [protocols] : [];
          protocols = [safeToken, ...existing];
        }
        super(url, protocols);
      }
    }
    window.WebSocket = PatchedWebSocket;

    // ════════════════════════════════════════════════════════════════════════════
    // System log helpers
    // ════════════════════════════════════════════════════════════════════════════

    const logEl = document.getElementById('log');

    function log(cls, badge, msg) {
      const line = document.createElement('div');
      line.className = `log-line ${cls}`;
      const ts = new Date().toISOString().slice(11, 23);
      line.innerHTML = `<span style="color:#484f58">${ts}</span>  `
        + (badge ? `<span class="badge ${badge}">${badge.toUpperCase()}</span>` : '')
        + escHtml(msg);
      logEl.appendChild(line);
      logEl.scrollTop = logEl.scrollHeight;
    }

    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function setStatus(id, state) {
      document.getElementById(id).className = state ? `status-${state}` : '';
    }

    // ════════════════════════════════════════════════════════════════════════════
    // Terminal output helpers
    // ════════════════════════════════════════════════════════════════════════════

    const termOut = document.getElementById('terminal-output');

    function tPrint(cls, text) {
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = text;
      termOut.appendChild(span);
      termOut.scrollTop = termOut.scrollHeight;
    }

    function tPrintHtml(html) {
      const div = document.createElement('div');
      div.innerHTML = html;
      termOut.appendChild(div);
      termOut.scrollTop = termOut.scrollHeight;
    }

    function tNewline() { termOut.appendChild(document.createTextNode('\n')); }

    function tEcho(cmd) {
      tPrint('t-prompt', '$ ');
      tPrint('t-cmd', cmd);
      tNewline();
    }

    function tErr(msg) { tPrint('t-err', msg); tNewline(); }
    function tOk(msg) { tPrint('t-ok', msg); tNewline(); }
    function tWarn(msg) { tPrint('t-warn', msg); tNewline(); }
    function tOut(msg) { tPrint('t-out', msg); tNewline(); }
    function tDim(msg) { tPrint('t-dim', msg); tNewline(); }

    // ════════════════════════════════════════════════════════════════════════════
    // Auth header helper
    // ════════════════════════════════════════════════════════════════════════════

    function authHeader() {
      const token = document.getElementById('auth-token').value.trim();
      const type = document.querySelector('input[name="token-type"]:checked').value;
      return { Authorization: type === 'github' ? `github ${token}` : `Bearer ${token}` };
    }

    // ════════════════════════════════════════════════════════════════════════════
    // Load WASM
    // ════════════════════════════════════════════════════════════════════════════

    let wasmReady = false;// TunnelSshClient = global from glue
    log('dim', 'wasm', 'loading tunnel_wasm.js ...');
    try {
      await (__wasm_init ? __wasm_init() : Promise.resolve());
  // TunnelSshClient is a global from inlined glue
      wasmReady = true;
      log('ok', 'wasm', 'module loaded and initialised');
    } catch (e) {
      log('error', 'wasm', `failed to load: ${e.message}`);
      log('warn', null, 'Have you run  wasm-pack build --target web --out-dir tunnel_test/pkg  yet?');
    }

    // ════════════════════════════════════════════════════════════════════════════
    // State
    // ════════════════════════════════════════════════════════════════════════════

    let selectedTunnel = null; // { clusterId, tunnelId, clientRelayUri }
    let rpcClient = null; // ChannelRpcClient instance (set after connect)

    // ════════════════════════════════════════════════════════════════════════════
    // List tunnels
    // ════════════════════════════════════════════════════════════════════════════

    document.getElementById('btn-list').onclick = async () => {
      const token = document.getElementById('auth-token').value.trim();
      if (!token) { log('warn', null, 'enter a token first'); return; }

      log('info', null, 'fetching tunnel list from global.rel.tunnels.api.visualstudio.com...');

      let tunnels = [];
      try {
        const resp = await fetch(
          'https://global.rel.tunnels.api.visualstudio.com/tunnels' +
          '?includePorts=true&labels=vscode-server-launcher&allLabels=true&global=true' +
          '&api-version=2023-09-27-preview',
          { headers: authHeader() }
        );
        if (!resp.ok) { log('error', null, `REST error: ${resp.status} ${resp.statusText}`); return; }
        const data = await resp.json();
        const regions = Array.isArray(data) ? data : (data.value ?? []);
        for (const region of regions) {
          for (const t of (region.value ?? [])) {
            tunnels.push({ ...t, _regionName: region.regionName ?? 'unknown' });
          }
        }
      } catch (e) { log('error', null, `fetch failed: ${e.message}`); return; }

      if (tunnels.length === 0) {
        log('warn', null, 'no tunnels found — check token and that tunnels exist for this account');
        return;
      }
      log('ok', null, `found ${tunnels.length} tunnel(s)`);
      renderTunnelList(tunnels);
    };

    function renderTunnelList(tunnels) {
      const wrap = document.getElementById('tunnel-list-wrap');
      const list = document.getElementById('tunnel-list');
      list.innerHTML = '';
      selectedTunnel = null;
      document.getElementById('btn-connect').disabled = true;

      for (const t of tunnels) {
        const endpoint = t.endpoints?.[0];
        const ports = (t.ports ?? []).map(p => p.portNumber).join(', ') || '—';
        const hostCount = t.status?.hostConnectionCount ?? 0;
        const online = hostCount > 0;
        const lastSeen = t.status?.lastHostConnectionTime
          ? new Date(t.status.lastHostConnectionTime).toLocaleString() : 'never';

        const item = document.createElement('label');
        item.className = 'tunnel-item';
        item.innerHTML =
          `<input type="radio" name="tunnel-select" value="${escHtml(t.tunnelId)}">` +
          `<div class="tunnel-meta">` +
          `<div class="tunnel-name">${escHtml(t.tunnelId)}</div>` +
          `<div class="tunnel-detail">` +
          `cluster: ${escHtml(t.clusterId)} &nbsp;·&nbsp; ` +
          `region: ${escHtml(t._regionName)} &nbsp;·&nbsp; ` +
          `ports: ${escHtml(ports)} &nbsp;·&nbsp; ` +
          `last host: ${escHtml(lastSeen)}` +
          `</div>` +
          `</div>` +
          `<span class="tunnel-badge ${online ? 'online' : 'offline'}">` +
          (online ? `● ${hostCount} host${hostCount !== 1 ? 's' : ''}` : '○ no host') +
          `</span>`;

        item.querySelector('input[type=radio]').addEventListener('change', () => {
          document.querySelectorAll('.tunnel-item').forEach(el => el.classList.remove('selected'));
          item.classList.add('selected');
          selectedTunnel = {
            clusterId: t.clusterId,
            tunnelId: t.tunnelId,
            clientRelayUri: endpoint?.clientRelayUri ?? null,
          };
          document.getElementById('btn-connect').disabled = false;
        });

        list.appendChild(item);
      }
      wrap.style.display = 'block';
    }

    // ════════════════════════════════════════════════════════════════════════════
    // Connect
    // ════════════════════════════════════════════════════════════════════════════

    document.getElementById('btn-connect').onclick = async () => {
      if (!wasmReady) { log('error', null, 'WASM not loaded — build the crate first'); return; }
      if (!selectedTunnel) { log('warn', null, 'select a tunnel first'); return; }

      const btn = document.getElementById('btn-connect');
      btn.disabled = true;
      setStatus('status-ws', 'pnd');
      setStatus('status-ssh', '');
      setStatus('status-ch', '');

      const { clusterId, tunnelId } = selectedTunnel;

      // Step 1: fetch connect token
      log('info', null, `fetching connect token for ${tunnelId} (cluster: ${clusterId})...`);
      let wsUrl, connectToken;
      try {
        const resp = await fetch(
          `https://${clusterId}.rel.tunnels.api.visualstudio.com/tunnels/${tunnelId}` +
          `?includePorts=true&tokenScopes=connect&api-version=2023-09-27-preview`,
          { headers: authHeader() }
        );
        if (!resp.ok) {
          log('error', null, `token fetch error: ${resp.status} ${resp.statusText}`);
          btn.disabled = false; return;
        }
        const data = await resp.json();
        connectToken = data?.accessTokens?.connect;
        wsUrl = data?.endpoints?.[0]?.clientRelayUri ?? selectedTunnel.clientRelayUri;
        if (!connectToken) {
          log('error', null, 'no connect token in response');
          log('data', null, JSON.stringify(data, null, 2).slice(0, 500));
          btn.disabled = false; return;
        }
        log('ok', null, `connect token fetched (${connectToken.length} chars)`);
        log('ok', null, `relay URI: ${wsUrl}`);
      } catch (e) {
        log('error', null, `token fetch failed: ${e.message}`);
        btn.disabled = false; return;
      }

      // Step 2: open WebSocket
      log('info', 'ws', `connecting to ${wsUrl}`);
      let ws;
      try {
        setTunnelAuth(connectToken, new URL(wsUrl).hostname);
        ws = new WebSocket(wsUrl, ['tunnel-relay-client-v2-dev', 'tunnel-relay-client']);
        ws.binaryType = 'arraybuffer';
      } catch (e) {
        log('error', 'ws', `WebSocket constructor failed: ${e.message}`);
        setStatus('status-ws', 'err'); btn.disabled = false; return;
      }

      await new Promise((resolve, reject) => {
        ws.onopen = () => resolve();
        ws.onerror = () => log('warn', 'ws', 'connection error (close event will follow)');
        ws.onclose = (e) => {
          if (e.wasClean) { resolve(); return; }
          reject(new Error(`WebSocket closed: code=${e.code} reason="${e.reason || '(none)'}"`));
        };
      }).catch(e => {
        log('error', 'ws', e.message);
        const msg = e.message;
        if (msg.includes('code=1006')) log('warn', null, 'Code 1006 — server rejected before upgrade');
        else if (msg.includes('code=1002')) log('warn', null, 'Code 1002 — protocol error');
        else if (msg.match(/code=[34]\d{3}/)) log('warn', null, 'Code 3xxx/4xxx — auth rejection');
        setStatus('status-ws', 'err'); btn.disabled = false; throw e;
      });

      log('ok', 'ws', `open — negotiated protocol: ${ws.protocol || '(none)'}`);
      setStatus('status-ws', 'ok');

      // Step 3: SSH handshake
      log('info', 'ssh', 'handing WebSocket to russh WASM module');
      setStatus('status-ssh', 'pnd');
      let channel;
      try {
        const client = new TunnelSshClient();
        channel = await client.connect(ws);
      } catch (e) {
        log('error', 'ssh', `SSH layer failed: ${e}`);
        setStatus('status-ssh', 'err'); btn.disabled = false; return;
      }
      log('ok', 'ssh', 'KEX + auth complete');
      setStatus('status-ssh', 'ok');
      log('ok', 'ssh', 'forwarded-tcpip channel to 31545 open');
      setStatus('status-ch', 'ok');

      // Step 4: deep-inspect what connect() returned before touching it
      {
        const proto1 = Object.getPrototypeOf(channel);
        const proto2 = proto1 ? Object.getPrototypeOf(proto1) : null;
        const ownKeys = Object.getOwnPropertyNames(channel ?? {});
        const protoKeys = Object.getOwnPropertyNames(proto1 ?? {}).filter(k => k !== 'constructor');
        const proto2Keys = Object.getOwnPropertyNames(proto2 ?? {}).filter(k => k !== 'constructor');
        log('info', null, `channel class: ${channel?.constructor?.name ?? typeof channel}`);
        log('info', null, `channel own props: [${ownKeys.join(', ')}]`);
        log('info', null, `channel proto methods: [${protoKeys.join(', ')}]`);
        log('info', null, `channel proto2 methods: [${proto2Keys.join(', ')}]`);
        // Log ALL enumerable keys including inherited
        const allKeys = [];
        for (const k in channel) allKeys.push(k);
        log('info', null, `channel for-in keys: [${allKeys.join(', ')}]`);
        // Check for common stream/channel method names
        const interesting = ['read', 'write', 'close', 'split', 'into_stream', 'stream', 'take', 'get_stream',
          'reader', 'writer', 'stdin', 'stdout', 'stderr', 'send', 'recv', 'open', 'make_writer', 'make_reader'];
        for (const k of interesting) {
          if (typeof channel[k] === 'function') log('ok', null, `channel.${k} is a function`);
        }
        console.log('[channel] full object:', channel);
        console.log('[channel] proto:', proto1);
      }

      // Step 5: create unified RPC client with read loop
      rpcClient = new ChannelRpcClient(channel);
      log('ok', null, 'RPC client ready');

      // Test basic RPC connectivity
      let remoteHost = tunnelId;
      try {
        log('info', null, 'Testing RPC with get hostname...');
        const hostname = await rpcClient.getHostname();
        remoteHost = hostname || tunnelId;
        log('ok', null, `Got hostname: ${remoteHost}`);
      } catch (e) {
        log('warn', null, `Hostname RPC failed: ${e.message} — using tunnel ID`);
      }

      document.getElementById('terminal-host').textContent = `${remoteHost} — tunnel shell`;
      document.getElementById('terminal-prompt-label').textContent = `${remoteHost} $ `;

      document.getElementById('terminal-wrap').style.display = 'block';
      document.getElementById('terminal-input').focus();

      tDim(`Connected to ${remoteHost}. Type 'help' for commands.`);
      tNewline();

      btn.disabled = false;
    };

    // ════════════════════════════════════════════════════════════════════════════
    // msgpack helpers
    // ════════════════════════════════════════════════════════════════════════════

    function hexSnippet(buf, maxBytes = 32) {
      const b = (buf instanceof Uint8Array) ? buf
        : (buf instanceof ArrayBuffer) ? new Uint8Array(buf)
          : (buf?.buffer instanceof ArrayBuffer) ? new Uint8Array(buf.buffer, buf.byteOffset ?? 0, buf.byteLength ?? buf.length)
            : new Uint8Array(Object.values(buf ?? {}));
      const slice = b.slice(0, maxBytes);
      const hex = Array.from(slice).map(x => x.toString(16).padStart(2, '0')).join(' ');
      return `[${b.length}b] ${hex}${b.length > maxBytes ? '…' : ''}`;
    }

    // Decode ONE complete msgpack value from buf[offset:].
    // Returns [object, bytesConsumed] or throws on incomplete/invalid data.
    // Uses a binary-search probe to find the exact frame boundary without re-encoding
    // (re-encoding is unsafe for binary fields like stream_data segments).
    function tryDecodeMsgpackFrame(buf, offset = 0) {
      const slice = offset === 0 ? buf : buf.subarray(offset);
      // Probe increasing lengths until decode succeeds without consuming extra bytes.
      // We do this by trying decode on successively larger slices.
      // For most frames this succeeds on the first try (exact slice).
      // We scan byte-by-byte from a minimum viable length upward.
      // Fast path: try the whole remaining slice first.
      let msg;
      try {
        msg = MessagePack.decode(slice);
        // Succeeded — but we don't know how many bytes were consumed.
        // Binary-search for the exact boundary.
      } catch (e) {
        throw e; // incomplete or invalid
      }

      // Find consumed length: try decoding increasingly small prefixes until it fails.
      // Start at 1 byte and double until decode succeeds, then binary search.
      let lo = 1, hi = slice.length;
      while (lo < hi) {
        const mid = (lo + hi) >> 1;
        try {
          MessagePack.decode(slice.subarray(0, mid));
          hi = mid;
        } catch (_) {
          lo = mid + 1;
        }
      }
      return [msg, lo];
    }

    function encodeMsgpack(obj) {
      const enc = MessagePack.encode(obj);
      return enc instanceof Uint8Array ? enc : new Uint8Array(enc);
    }

    function mergeChunks(chunks) {
      const total = chunks.reduce((s, c) => s + c.length, 0);
      const out = new Uint8Array(total);
      let pos = 0;
      for (const c of chunks) { out.set(c, pos); pos += c.length; }
      return out;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // ChannelRpcClient
    //
    // Uses channel.split() to get independent reader/writer halves, allowing
    // a background read loop and foreground writes to run concurrently.
    // ════════════════════════════════════════════════════════════════════════════

    class ChannelRpcClient {
      constructor(channel) {
        const { reader, writer } = channel.split();
        this._reader = reader;
        this._writer = writer;
        this._nextId = 1;
        this._pending = new Map();   // id → { resolve, reject }
        this._pendingDuplex = new Map();   // requestId → { stdoutQ, stderrQ, resolveIds }
        this._pendingSingle = new Map();   // requestId → { streamQ, resolveId }
        this._streamSinks = new Map();   // streamId  → AsyncQueue
        this._buf = new Uint8Array(0);
        this._closed = false;
        this._frameCount = 0;

        log('info', 'rpc', 'ChannelRpcClient ready (split reader/writer)');
        this._readLoop();
      }

      // ── Background read loop ─────────────────────────────────────────────────

      async _readLoop() {
        log('info', 'rpc', 'read loop started');
        while (!this._closed) {
          let chunk;
          try {
            chunk = await this._reader.read(4096);
          } catch (e) {
            const msg = String(e);
            log('error', 'rpc', `read error: ${msg}`);
            this._closeAll(new Error(msg));
            break;
          }

          const incoming = !chunk || chunk.length === 0 ? null
            : chunk instanceof Uint8Array ? chunk
              : chunk instanceof ArrayBuffer ? new Uint8Array(chunk)
                : chunk?.buffer instanceof ArrayBuffer
                  ? new Uint8Array(chunk.buffer, chunk.byteOffset ?? 0, chunk.byteLength)
                  : null;

          if (!incoming) continue;

          log('data', 'rpc', `read ${incoming.length}b: ${hexSnippet(incoming)}`);

          const merged = new Uint8Array(this._buf.length + incoming.length);
          merged.set(this._buf);
          merged.set(incoming, this._buf.length);
          this._buf = merged;

          let offset = 0;
          while (offset < this._buf.length) {
            let frame, consumed;
            try { [frame, consumed] = tryDecodeMsgpackFrame(this._buf, offset); }
            catch (_) { break; }
            this._frameCount++;
            log('data', 'rpc', `frame #${this._frameCount}: ${JSON.stringify(frame).slice(0, 200)}`);
            console.log(`[RPC:frame] #${this._frameCount}:`, frame);
            this._dispatch(frame);
            offset += consumed;
          }
          this._buf = this._buf.slice(offset);
        }
        log('warn', 'rpc', 'read loop exited');
      }

      _closeAll(err) {
        log('error', 'rpc', `closeAll: ${err.message}`);
        this._closed = true;
        for (const { reject } of this._pending.values()) reject(err);
        this._pending.clear();
        for (const sink of this._streamSinks.values()) sink.end(err);
        this._streamSinks.clear();
      }

      _dispatch(msg) {
        const { id, method, params, result, error } = msg;

        if (id !== undefined && id !== null) {
          const waiter = this._pending.get(id);
          if (waiter) {
            this._pending.delete(id);
            if (error) waiter.reject(new Error(error.message ?? JSON.stringify(error)));
            else waiter.resolve(result);
          } else {
            log('warn', 'rpc', `no waiter for response id=${id}`);
          }
          return;
        }

        switch (method) {
          case 'version':
            log('info', 'rpc', `server version ${params?.version} protocol ${params?.protocol_version}`);
            break;
          case 'streams_started': {
            const { for_request_id, stream_ids } = params;
            const duplex = this._pendingDuplex.get(for_request_id);
            if (duplex && stream_ids.length >= 3) {
              this._pendingDuplex.delete(for_request_id);
              this._streamSinks.set(stream_ids[1], duplex.stdoutQ);
              this._streamSinks.set(stream_ids[2], duplex.stderrQ);
              duplex.resolveIds(stream_ids);
              return;
            }
            const single = this._pendingSingle.get(for_request_id);
            if (single && stream_ids.length >= 1) {
              this._pendingSingle.delete(for_request_id);
              this._streamSinks.set(stream_ids[0], single.streamQ);
              single.resolveId(stream_ids[0]);
              return;
            }
            log('warn', 'rpc', `streams_started for unknown req ${for_request_id}`);
            break;
          }
          case 'stream_data': {
            const { stream, segment } = params;
            const sink = this._streamSinks.get(stream);
            if (sink) sink.push(segment instanceof Uint8Array ? segment : new Uint8Array(segment));
            break;
          }
          case 'stream_ended': {
            const { stream } = params;
            const sink = this._streamSinks.get(stream);
            if (sink) { this._streamSinks.delete(stream); sink.end(); }
            break;
          }
          default:
            console.log(`[RPC:dispatch] unhandled notification: ${method}`);
        }
      }

      // ── Write directly — now safe to call concurrently with the read loop ────

      async _write(msg) {
        const bytes = encodeMsgpack(msg);
        log('data', 'rpc', `→ ${bytes.length}b ${msg.method ?? 'notification'} id=${msg.id ?? 'null'}`);
        await this._writer.write(bytes);
      }

      // ── Public API ────────────────────────────────────────────────────────────

      call(method, params) {
        const id = this._nextId++;
        log('info', 'rpc', `call ${method} id=${id}`);
        return new Promise((resolve, reject) => {
          this._pending.set(id, { resolve, reject });
          this._write({ id, method, params }).catch(e => {
            this._pending.delete(id);
            reject(e instanceof Error ? e : new Error(String(e)));
          });
          setTimeout(() => {
            if (this._pending.has(id)) {
              this._pending.delete(id);
              reject(new Error(`RPC '${method}' timed out`));
            }
          }, 30_000);
        });
      }

      async _openSingleStream(method, params) {
        const id = this._nextId++;
        const streamQ = new AsyncQueue();
        const streamId = await new Promise((resolve, reject) => {
          this._pendingSingle.set(id, { streamQ, resolveId: resolve });
          this._write({ id, method, params }).catch(e => {
            this._pendingSingle.delete(id);
            reject(e instanceof Error ? e : new Error(String(e)));
          });
          setTimeout(() => {
            if (this._pendingSingle.has(id)) {
              this._pendingSingle.delete(id);
              reject(new Error(`${method} streams_started timed out`));
            }
          }, 30_000);
        });
        const resultP = new Promise((resolve, reject) => {
          this._pending.set(id, { resolve, reject });
        });
        return { streamQ, resultP, id };
      }

      async _openDuplexStream(method, params) {
        const id = this._nextId++;
        const stdoutQ = new AsyncQueue();
        const stderrQ = new AsyncQueue();
        const streamIds = await new Promise((resolve, reject) => {
          this._pendingDuplex.set(id, { stdoutQ, stderrQ, resolveIds: resolve });
          this._write({ id, method, params }).catch(e => {
            this._pendingDuplex.delete(id);
            reject(e instanceof Error ? e : new Error(String(e)));
          });
          setTimeout(() => {
            if (this._pendingDuplex.has(id)) {
              this._pendingDuplex.delete(id);
              reject(new Error(`${method} streams_started timed out`));
            }
          }, 30_000);
        });
        const resultP = new Promise((resolve, reject) => {
          this._pending.set(id, { resolve, reject });
        });
        return { stdinId: streamIds[0], stdoutQ, stderrQ, resultP };
      }

      async _writeStreamData(streamId, data) {
        await this._write({ id: null, method: 'stream_data', params: { stream: streamId, segment: data } });
      }

      async _writeStreamEnded(streamId) {
        await this._write({ id: null, method: 'stream_ended', params: { stream: streamId } });
      }

      // ── High-level helpers ────────────────────────────────────────────────────

      async getHostname() { const r = await this.call('gethostname', {}); return r?.value ?? r; }
      async getEnv() { return this.call('get_env', {}); }
      async sysKill(pid) { return this.call('sys_kill', { pid }); }
      async fsStat(path) { return this.call('fs_stat', { path }); }
      async fsReaddir(path) { return this.call('fs_readdir', { path }); }
      async fsRm(path) { return this.call('fs_rm', { path }); }
      async fsMkdirp(path) { return this.call('fs_mkdirp', { path }); }
      async fsRename(from, to) { return this.call('fs_rename', { from_path: from, to_path: to }); }

      async fsRead(path) {
        const { streamQ, resultP } = await this._openSingleStream('fs_read', { path });
        const chunks = [];
        for await (const item of streamQ) chunks.push(item);
        await resultP;
        return mergeChunks(chunks);
      }

      async fsWrite(path, data) {
        const { streamQ, resultP, id } = await this._openSingleStream('fs_write', { path });
        await this._writeStreamData(id, data);
        await this._writeStreamEnded(id);
        for await (const _ of streamQ) { }
        await resultP;
      }

      async fsConnect(path, data) {
        const { streamQ, resultP, id } = await this._openSingleStream('fs_connect', { path });
        if (data?.length) await this._writeStreamData(id, data);
        await this._writeStreamEnded(id);
        const chunks = [];
        for await (const item of streamQ) chunks.push(item);
        await resultP;
        return mergeChunks(chunks);
      }

      async spawn(args) { return this._openDuplexStream('spawn', { command: args[0], args: args.slice(1), cwd: null, env: {} }); }
      async spawnCli(args) { return this._openDuplexStream('spawn_cli', { command: args[0], args: args.slice(1), cwd: null, env: {} }); }

      async runSpawn(method, args) {
        const handle = await (method === 'spawn' ? this.spawn(args) : this.spawnCli(args));
        await this._writeStreamEnded(handle.stdinId);

        await Promise.all([
          (async () => { for await (const c of handle.stdoutQ) { tPrint('t-out', new TextDecoder().decode(c)); termOut.scrollTop = termOut.scrollHeight; } })(),
          (async () => { for await (const c of handle.stderrQ) { tPrint('t-err', new TextDecoder().decode(c)); termOut.scrollTop = termOut.scrollHeight; } })(),
        ]);

        let exitCode = 0;
        try { const r = await handle.resultP; exitCode = r?.exit_code ?? 0; } catch (_) { }
        tNewline();
        exitCode === 0 ? tDim('[exited 0]') : tWarn(`[exited ${exitCode}]`);
        return exitCode;
      }
    }
    // ════════════════════════════════════════════════════════════════════════════
    // AsyncQueue — a simple async iterable push queue
    // Used to decouple the read-loop dispatcher from awaiting callers.
    // ════════════════════════════════════════════════════════════════════════════

    class AsyncQueue {
      constructor() {
        this._items = [];      // buffered items
        this._waiters = [];      // resolve callbacks waiting for items
        this._done = false;
        this._err = null;
      }

      push(item) {
        if (this._done) return;
        if (this._waiters.length > 0) {
          const resolve = this._waiters.shift();
          resolve({ value: item, done: false });
        } else {
          this._items.push(item);
        }
      }

      end(err = null) {
        if (this._done) return;
        this._done = true;
        this._err = err;
        // Wake all waiters
        for (const resolve of this._waiters) {
          if (err) resolve({ value: undefined, done: true, err });
          else resolve({ value: undefined, done: true });
        }
        this._waiters = [];
      }

      // AsyncIterator protocol
      [Symbol.asyncIterator]() { return this; }

      next() {
        if (this._items.length > 0) {
          return Promise.resolve({ value: this._items.shift(), done: false });
        }
        if (this._done) {
          return this._err
            ? Promise.reject(this._err)
            : Promise.resolve({ value: undefined, done: true });
        }
        return new Promise(resolve => this._waiters.push(resolve));
      }
    }

    // ════════════════════════════════════════════════════════════════════════════
    // Terminal command definitions
    // ════════════════════════════════════════════════════════════════════════════

    const COMMANDS = {
      help: {
        desc: 'show this help',
        usage: '',
        async run(_args) {
          tOut('Available commands:');
          tNewline();
          const pad = Math.max(...Object.keys(COMMANDS).map(k => k.length)) + 2;
          for (const [name, def] of Object.entries(COMMANDS)) {
            const sig = def.usage ? `${name} ${def.usage}` : name;
            tPrintHtml(
              `  <span class="t-ok">${escHtml(sig.padEnd(pad + 10))}</span>` +
              `<span class="t-dim">${escHtml(def.desc)}</span>`
            );
          }
          tNewline();
        }
      },

      gethostname: {
        desc: 'print remote hostname',
        usage: '',
        async run(_args) {
          const hostname = await rpcClient.getHostname();
          tOk(`hostname: ${hostname}`);
        }
      },

      get_env: {
        desc: 'print remote environment variables and OS info',
        usage: '',
        async run(_args) {
          const env = await rpcClient.getEnv();
          if (env.os_platform) {
            tPrintHtml(`<span class="t-key">platform</span>  <span class="t-val">${escHtml(env.os_platform)}</span>`);
            tNewline();
          }
          if (env.os_release) {
            tPrintHtml(`<span class="t-key">release </span>  <span class="t-val">${escHtml(env.os_release)}</span>`);
            tNewline();
            tNewline();
          }
          if (env.env) {
            for (const [k, v] of Object.entries(env.env).sort()) {
              tPrintHtml(`<span class="t-key">${escHtml(k)}</span>=<span class="t-val">${escHtml(v)}</span>`);
              tNewline();
            }
          }
        }
      },

      sys_kill: {
        desc: 'send SIGTERM to a remote process',
        usage: '<pid>',
        async run(args) {
          if (!args[0]) { tErr('usage: sys_kill <pid>'); return; }
          const pid = parseInt(args[0], 10);
          if (isNaN(pid)) { tErr('invalid pid'); return; }
          const result = await rpcClient.sysKill(pid);
          result.success ? tOk(`killed pid ${pid}`) : tErr(`kill failed`);
        }
      },

      fs_stat: {
        desc: 'stat a remote path',
        usage: '<path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_stat <path>'); return; }
          const r = await rpcClient.fsStat(args[0]);
          tPrintHtml(
            `exists: <span class="t-val">${r.exists}</span>  ` +
            `type: <span class="t-val">${r.type ?? 'unknown'}</span>  ` +
            `size: <span class="t-val">${r.size ?? 'unknown'}</span>`
          );
          tNewline();
        }
      },

      fs_readdir: {
        desc: 'list a remote directory',
        usage: '<path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_readdir <path>'); return; }
          const r = await rpcClient.fsReaddir(args[0]);
          const entries = r.contents ?? [];
          if (entries.length === 0) { tDim('(empty directory)'); return; }

          const table = document.createElement('table');
          table.className = 'dir-table';
          for (const entry of [...entries].sort((a, b) => a.name.localeCompare(b.name))) {
            const kind = entry.type ?? 'unknown';
            const cls = kind === 'dir' ? 't-dir' : kind === 'link' ? 't-link' : 't-file';
            const icon = kind === 'dir' ? '📁 ' : kind === 'link' ? '🔗 ' : '📄 ';
            const tr = document.createElement('tr');
            tr.innerHTML =
              `<td><span class="t-dim">${escHtml(kind.padEnd(5))}</span></td>` +
              `<td><span class="${cls}">${icon}${escHtml(entry.name)}</span></td>`;
            table.appendChild(tr);
          }
          termOut.appendChild(table);
          tNewline();
        }
      },

      fs_read: {
        desc: 'read a remote file — displays text and offers a download',
        usage: '<path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_read <path>'); return; }
          tDim(`reading ${args[0]}...`);
          const data = await rpcClient.fsRead(args[0]);

          // Offer a download button
          const blob = new Blob([data]);
          const url = URL.createObjectURL(blob);
          const fname = args[0].split('/').pop();
          const btn = document.createElement('button');
          btn.className = 't-dl-btn';
          btn.textContent = `⬇ download ${escHtml(fname)} (${data.length} bytes)`;
          btn.onclick = () => {
            const a = Object.assign(document.createElement('a'), { href: url, download: fname });
            a.click();
          };
          termOut.appendChild(btn);
          tNewline();

          // Show text preview (first 4 KiB)
          const text = new TextDecoder('utf-8', { fatal: false }).decode(data.slice(0, 4096));
          const isBinary = data.slice(0, 512).some(b => b === 0);
          if (isBinary) {
            tDim(`[binary file — ${data.length} bytes]`);
          } else {
            tPrint('t-out', text);
            if (data.length > 4096) tDim(`\n... (${data.length - 4096} more bytes)`);
          }
          tNewline();
        }
      },

      fs_write: {
        desc: 'write a file — opens a local file picker to choose source',
        usage: '<remote-path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_write <remote-path>'); return; }
          const remotePath = args[0];

          // Open a file picker
          const input = document.createElement('input');
          input.type = 'file';
          input.style.display = 'none';
          document.body.appendChild(input);

          const file = await new Promise(resolve => {
            input.onchange = () => resolve(input.files?.[0] ?? null);
            input.oncancel = () => resolve(null);
            input.click();
          });
          document.body.removeChild(input);

          if (!file) { tWarn('no file selected'); return; }

          tDim(`uploading ${file.name} (${file.size} bytes) → ${remotePath}...`);
          const data = new Uint8Array(await file.arrayBuffer());
          await rpcClient.fsWrite(remotePath, data);
          tOk(`written ${data.length} bytes to ${remotePath}`);
        }
      },

      fs_write_text: {
        desc: 'write inline text to a remote file',
        usage: '<path> <text…>',
        async run(args) {
          if (args.length < 2) { tErr('usage: fs_write_text <path> <text...>'); return; }
          const path = args[0];
          const text = args.slice(1).join(' ');
          const data = new TextEncoder().encode(text);
          tDim(`writing ${data.length} bytes to ${path}...`);
          await rpcClient.fsWrite(path, data);
          tOk(`written to ${path}`);
        }
      },

      fs_rm: {
        desc: 'remove a remote file or directory',
        usage: '<path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_rm <path>'); return; }
          await rpcClient.fsRm(args[0]);
          tOk(`removed ${args[0]}`);
        }
      },

      fs_mkdirp: {
        desc: 'create remote directory (and parents)',
        usage: '<path>',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_mkdirp <path>'); return; }
          await rpcClient.fsMkdirp(args[0]);
          tOk(`created ${args[0]}`);
        }
      },

      fs_rename: {
        desc: 'rename / move a remote path',
        usage: '<from> <to>',
        async run(args) {
          if (args.length < 2) { tErr('usage: fs_rename <from> <to>'); return; }
          await rpcClient.fsRename(args[0], args[1]);
          tOk(`renamed ${args[0]} → ${args[1]}`);
        }
      },

      fs_connect: {
        desc: 'write data to a Unix socket and print the response',
        usage: '<path> [data]',
        async run(args) {
          if (!args[0]) { tErr('usage: fs_connect <path> [data]'); return; }
          const path = args[0];
          const data = args.length > 1
            ? new TextEncoder().encode(args.slice(1).join(' '))
            : new Uint8Array(0);
          tDim(`connecting to socket ${path}...`);
          const response = await rpcClient.fsConnect(path, data);
          const text = new TextDecoder('utf-8', { fatal: false }).decode(response);
          tPrint('t-out', text);
          tNewline();
        }
      },

      spawn: {
        desc: 'run a command on the remote host, streaming output',
        usage: '<command> [args…]',
        async run(args) {
          if (!args[0]) { tErr('usage: spawn <command> [args...]'); return; }
          await rpcClient.runSpawn('spawn', args);
        }
      },

      spawn_cli: {
        desc: 'run a CLI command (shell-expanded) on the remote host',
        usage: '<command> [args…]',
        async run(args) {
          if (!args[0]) { tErr('usage: spawn_cli <command> [args...]'); return; }
          await rpcClient.runSpawn('spawn_cli', args);
        }
      },

      clear: {
        desc: 'clear the terminal',
        usage: '',
        async run(_args) { termOut.innerHTML = ''; }
      },
    };

    // ════════════════════════════════════════════════════════════════════════════
    // Terminal input handling — history, tab-complete, command dispatch
    // ════════════════════════════════════════════════════════════════════════════

    const termInput = document.getElementById('terminal-input');
    const acDropdown = document.getElementById('autocomplete');
    const cmdNames = Object.keys(COMMANDS);

    let history = [];
    let historyIdx = -1;
    let acItems = [];
    let acIdx = -1;
    let inputBusy = false;

    termInput.addEventListener('keydown', async (e) => {
      // Tab — autocomplete
      if (e.key === 'Tab') {
        e.preventDefault();
        const val = termInput.value;
        const tokens = shellSplit(val);

        if (tokens.length <= 1 && !val.endsWith(' ')) {
          const prefix = tokens[0] ?? '';
          acItems = cmdNames.filter(n => n.startsWith(prefix));
          if (acItems.length === 1) {
            termInput.value = acItems[0] + ' ';
            hideAc();
          } else if (acItems.length > 1) {
            const lcp = acItems.reduce((a, b) => {
              let i = 0;
              while (i < a.length && i < b.length && a[i] === b[i]) i++;
              return a.slice(0, i);
            });
            if (lcp.length > prefix.length) {
              termInput.value = lcp;
              hideAc();
            } else {
              showAc(acItems, (s) => { termInput.value = s + ' '; hideAc(); });
            }
          }
        } else {
          const lastTok = tokens[tokens.length - 1] ?? '';
          const dir = lastTok.includes('/') ? lastTok.replace(/\/[^/]*$/, '') || '/' : '.';
          const stub = lastTok.includes('/') ? lastTok.replace(/.*\//, '') : lastTok;
          try {
            const r = await rpcClient.fsReaddir(dir);
            const matches = (r.contents ?? [])
              .filter(e => e.name.startsWith(stub))
              .map(e => e.type === 'dir' ? e.name + '/' : e.name);
            if (matches.length === 1) {
              const newTokens = [...tokens.slice(0, -1),
              (lastTok.includes('/') ? lastTok.replace(/[^/]*$/, '') : '') + matches[0]];
              termInput.value = newTokens.join(' ');
              hideAc();
            } else if (matches.length > 1) {
              showAc(matches, (s) => {
                const newTokens = [...tokens.slice(0, -1),
                (lastTok.includes('/') ? lastTok.replace(/[^/]*$/, '') : '') + s];
                termInput.value = newTokens.join(' ');
                hideAc();
              });
            }
          } catch (_) { }
        }
        return;
      }

      if (e.key === 'Escape') { hideAc(); return; }

      if (acItems.length > 0 && (e.key === 'ArrowDown' || e.key === 'ArrowUp')) {
        e.preventDefault();
        acIdx = e.key === 'ArrowDown'
          ? Math.min(acIdx + 1, acItems.length - 1)
          : Math.max(acIdx - 1, 0);
        renderAcHighlight();
        return;
      }

      if (acItems.length > 0 && e.key === 'Enter' && acIdx >= 0) {
        e.preventDefault();
        acDropdown.querySelectorAll('.ac-item')[acIdx]?.click();
        return;
      }

      if (acItems.length === 0 && e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIdx < history.length - 1) {
          historyIdx++;
          termInput.value = history[history.length - 1 - historyIdx];
        }
        return;
      }
      if (acItems.length === 0 && e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIdx > 0) {
          historyIdx--;
          termInput.value = history[history.length - 1 - historyIdx];
        } else {
          historyIdx = -1;
          termInput.value = '';
        }
        return;
      }

      if (e.key === 'Enter') {
        hideAc();
        if (inputBusy) return;
        const raw = termInput.value.trim();
        if (!raw) return;
        termInput.value = '';
        historyIdx = -1;
        history.push(raw);

        tEcho(raw);

        if (!rpcClient) { tErr('not connected'); return; }

        const tokens = shellSplit(raw);
        const cmd = tokens[0];
        const args = tokens.slice(1);
        const def = COMMANDS[cmd];

        if (!def) {
          tErr(`unknown command: ${cmd}  (type 'help' for a list)`);
          return;
        }

        inputBusy = true;
        termInput.disabled = true;
        try {
          await def.run(args);
        } catch (err) {
          tErr(`error: ${err.message}`);
        } finally {
          inputBusy = false;
          termInput.disabled = false;
          termInput.focus();
        }
        return;
      }

      hideAc();
    });

    // ── Autocomplete UI ────────────────────────────────────────────────────────

    function showAc(items, onSelect) {
      acItems = items;
      acIdx = -1;
      acDropdown.innerHTML = '';

      for (let i = 0; i < items.length; i++) {
        const el = document.createElement('div');
        el.className = 'ac-item';
        const def = COMMANDS[items[i]];
        el.innerHTML = `<span>${escHtml(items[i])}</span>` +
          (def ? `<span class="ac-sub">${escHtml(def.desc)}</span>` : '');
        el.addEventListener('click', () => { onSelect(items[i]); });
        acDropdown.appendChild(el);
      }

      acDropdown.style.display = 'block';
      const wrap = document.getElementById('terminal-input-wrap');
      acDropdown.style.bottom = (wrap.offsetHeight) + 'px';
      acDropdown.style.left = '0px';
    }

    function hideAc() {
      acItems = [];
      acIdx = -1;
      acDropdown.style.display = 'none';
    }

    function renderAcHighlight() {
      acDropdown.querySelectorAll('.ac-item').forEach((el, i) => {
        el.classList.toggle('ac-active', i === acIdx);
      });
    }

    // ── Shell word splitter ────────────────────────────────────────────────────

    function shellSplit(line) {
      const tokens = [];
      let cur = '', inQ = false, qChar = '';
      for (const ch of line) {
        if (inQ) {
          if (ch === qChar) { inQ = false; }
          else { cur += ch; }
        } else if (ch === '"' || ch === "'") {
          inQ = true; qChar = ch;
        } else if (ch === ' ' || ch === '\t') {
          if (cur) { tokens.push(cur); cur = ''; }
        } else {
          cur += ch;
        }
      }
      if (cur) tokens.push(cur);
      return tokens;
    }

    // ════════════════════════════════════════════════════════════════════════════
    // Misc UI
    // ════════════════════════════════════════════════════════════════════════════

    document.getElementById('btn-clear').onclick = () => logEl.innerHTML = '';
    document.getElementById('btn-clear-term').onclick = () => termOut.innerHTML = '';
    document.getElementById('btn-disconnect').onclick = () => {
      if (rpcClient) { rpcClient._closed = true; rpcClient = null; }
      document.getElementById('terminal-wrap').style.display = 'none';
      setStatus('status-ws', '');
      setStatus('status-ssh', '');
      setStatus('status-ch', '');
      log('info', null, 'disconnected');
    };

  
})();
</script>
</body>
